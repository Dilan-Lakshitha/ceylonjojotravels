<div class="container-fluid booking mt-1" *transloco="let t; scope: 'common'; prefix: 'common'">
  <div class="container">
    <h2 class="text-center text-primary mb-3 i18n-section-title">
      {{ tour.title }}
    </h2>
    <app-tour-stats [items]="[
      { icon: 'fa-clock', label: t('label.duration'), value: tour.duration },
      { icon: 'fa-users', label: t('label.maxPeople'), value: tour.persons },
      { icon: 'fa-dollar-sign', label: t('label.price'), value: '$ ' + tour.price + ' (' + t('label.priceBasedOn2') + ')' },
      { icon: 'fa-map-marked-alt', label: t('label.tourType'), value: tour.tourType || '' }
    ]"></app-tour-stats>
  </div>
</div>

<div class="container-fluid" *transloco="let t; scope: 'common'; prefix: 'common'">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 ">
        <div class="d-flex flex-column">
          <div class="bg-white p-4 p-lg-5 my-lg-3">
            <h2 class="text-primary i18n-section-eyebrow justify-content-start">{{ t('label.overview') }}</h2>
            <p>{{tour.overview}}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="container-fluid" *transloco="let t; scope: 'common'; prefix: 'common'">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 mb-4">
        <div class="bg-white p-2 p-lg-5 shadow-sm">
          <div *ngIf="tour.itinerary">
            <h3 class="mb-3">{{ t('label.itinerary') }}</h3>
            <app-accordion-panel
              *ngFor="let day of tour.itinerary"
              [title]="t('label.day') + ' ' + day.day + ': ' + day.title"
              [open]="!!expandedDays[day.day]"
              (toggled)="toggleDay(day.day)">
              <div *ngFor="let activity of day.activities" class="mb-3">
                <h5 class="text">
                  <i class="fas {{ activity.title.icon || 'fa-circle' }} mr-2"
                    [style.color]="activity.title.color"></i>
                  {{ activity.title.title }}
                </h5>
                <div *ngIf="activity.description">{{ activity.description }}</div>

                <ul *ngIf="activity.extra?.length" class="small text-muted ms-4">
                  <li *ngFor="let item of activity.extra">{{ item }}</li>
                </ul>

                <img *ngIf="activity.image" [src]="activity.image" class="rounded my-2"
                  style="width: 100px; height: 100px; object-fit: cover; cursor: pointer;"
                  (click)="openImage(activity.image)" />
              </div>
            </app-accordion-panel>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="container-fluid" *transloco="let t; scope: 'common'; prefix: 'common'">
  <div class="container">
    <div class="row">
      <div class="col-md-6 mb-4">
        <div class="card shadow-sm h-100">
          <div class="card-header bg-white d-flex align-items-center border-bottom border-primary">
            <i class="fas fa-check-circle mr-2 text-primary"></i>
            <h5 class="mb-0 text-primary">{{ t('label.includes') }}</h5>
          </div>
          <div class="card-body">
            <ul class="list-unstyled mb-0">
              <li *ngFor="let item of tour.includes" class="include-row">
                <span class="icon-circle bg-success text-white">
                  <i class="fas fa-check"></i>
                </span>
                <span class="include-item-text">{{ item }}</span>
              </li>
            </ul>
          </div>
        </div>
      </div>
      <div class="col-md-6 mb-4">
        <div class="card shadow-sm h-100 border" style="border-color: #ada878;">
          <div class="card-header bg-white d-flex align-items-center" style="border-bottom: 2px solid #ada878;">
            <i class="fas fa-times-circle mr-2" style="color: #ada878;"></i>
            <h5 class="mb-0" style="color: #ada878;">{{ t('label.excludes') }}</h5>
          </div>
          <div class="card-body">
            <ul class="list-unstyled mb-0">
              <li *ngFor="let item of tour.excludes" class="exclude-row">
                <span class="icon-circle" style="background-color: #ada878; color: #fff;">
                  <i class="fas fa-times" style="font-size: 0.8rem;"></i>
                </span>
                <span class="exclude-item-text">{{ item }}</span>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div *ngIf="selectedImage" class="image-modal">
  <button class="close-btn" (click)="closeImage()">×</button>
  <img [src]="selectedImage" class="modal-content" />
</div>
