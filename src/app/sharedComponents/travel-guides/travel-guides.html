<!-- Guides Start -->
<div class="container-fluid py-5" *transloco="let t; scope: 'common'; prefix: 'common'">
  <div class="container pt-5 pb-3">
    <div class="text-center mb-3 pb-3">
      <h6 class="text-primary i18n-section-eyebrow">{{ t('pages.guides.eyebrow') }}</h6>
      <h1 class="i18n-section-title">{{ t('pages.guides.heading') }}</h1>
    </div>
    <div class="row i18n-card-grid">
      <div class="col-lg-3 col-md-4 col-sm-6 pb-2" *ngFor="let member of guides">
        <div class="team-item bg-white mb-4 i18n-equal-card">
          <div class="team-img position-relative overflow-hidden">
            <img class="img-fluid w-100" [src]="member.image" [alt]="member.name" loading="lazy" width="400" height="500" />
          </div>
          <div class="text-center py-4">
            <h5 class="text-truncate">{{ member.name }}</h5>
            <p class="m-0">{{ t('pages.guides.role') }}</p>
            <p class="m-0">{{ member.country }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<!-- Guides End -->
