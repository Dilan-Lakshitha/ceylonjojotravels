<ng-container *transloco="let t; scope: 'destinations'; prefix: 'destinations'">
    <div class="container-fluid py-5">
        <div class="container pt-5 pb-3">
            <div class="text-center mb-3 pb-3">
                <h6 class="text-primary i18n-section-eyebrow">{{ t('title') }}</h6>
                <h1 class="i18n-section-title">{{ t('intro') }}</h1>
            </div>
            <div class="dest-card-grid">
                <app-destination-card
                    image="assets/img/destination-1.jpg"
                    [title]="t('sigiriya.title')"
                    [subtitle]="t('sigiriya.subtitle')"
                    [badge]="t('sigiriya.badge')"
                    [alt]="t('sigiriya.alt')"
                    [ctaLabel]="t('viewTours')"
                    [featured]="true"
                    [featuredLabel]="t('featured')"
                    [wishlistLabel]="t('wishlist')"
                    [routerLink]="toursLink"
                    [highlights]="[
                      { icon: 'fa-mountain', label: t('sigiriya.h1') },
                      { icon: 'fa-tree', label: t('sigiriya.h2') },
                      { icon: 'fa-sun', label: t('sigiriya.h3') }
                    ]"
                    (activate)="goTours()">
                </app-destination-card>
                <app-destination-card
                    image="assets/img/destination-2.jpg"
                    [title]="t('ella.title')"
                    [subtitle]="t('ella.subtitle')"
                    [badge]="t('ella.badge')"
                    [alt]="t('ella.alt')"
                    [ctaLabel]="t('viewTours')"
                    [featuredLabel]="t('featured')"
                    [wishlistLabel]="t('wishlist')"
                    [routerLink]="toursLink"
                    [highlights]="[
                      { icon: 'fa-archway', label: t('ella.h1') },
                      { icon: 'fa-train', label: t('ella.h2') },
                      { icon: 'fa-hiking', label: t('ella.h3') }
                    ]"
                    (activate)="goTours()">
                </app-destination-card>
                <app-destination-card
                    image="assets/img/destination-3.jpg"
                    [title]="t('yala.title')"
                    [subtitle]="t('yala.subtitle')"
                    [badge]="t('yala.badge')"
                    [alt]="t('yala.alt')"
                    [ctaLabel]="t('viewTours')"
                    [featured]="true"
                    [featuredLabel]="t('featured')"
                    [wishlistLabel]="t('wishlist')"
                    [routerLink]="toursLink"
                    [highlights]="[
                      { icon: 'fa-paw', label: t('yala.h1') },
                      { icon: 'fa-binoculars', label: t('yala.h2') },
                      { icon: 'fa-sun', label: t('yala.h3') }
                    ]"
                    (activate)="goTours()">
                </app-destination-card>
                <app-destination-card
                    image="assets/img/destination-4.jpg"
                    [title]="t('kandy.title')"
                    [subtitle]="t('kandy.subtitle')"
                    [badge]="t('kandy.badge')"
                    [alt]="t('kandy.alt')"
                    [ctaLabel]="t('viewTours')"
                    [featuredLabel]="t('featured')"
                    [wishlistLabel]="t('wishlist')"
                    [routerLink]="toursLink"
                    [highlights]="[
                      { icon: 'fa-landmark', label: t('kandy.h1') },
                      { icon: 'fa-water', label: t('kandy.h2') },
                      { icon: 'fa-leaf', label: t('kandy.h3') }
                    ]"
                    (activate)="goTours()">
                </app-destination-card>
                <app-destination-card
                    image="assets/img/destination-5.jpg"
                    [title]="t('dambulla.title')"
                    [subtitle]="t('dambulla.subtitle')"
                    [badge]="t('dambulla.badge')"
                    [alt]="t('dambulla.alt')"
                    [ctaLabel]="t('viewTours')"
                    [featuredLabel]="t('featured')"
                    [wishlistLabel]="t('wishlist')"
                    [routerLink]="toursLink"
                    [highlights]="[
                      { icon: 'fa-monument', label: t('dambulla.h1') },
                      { icon: 'fa-place-of-worship', label: t('dambulla.h2') },
                      { icon: 'fa-mountain', label: t('dambulla.h3') }
                    ]"
                    (activate)="goTours()">
                </app-destination-card>
                <app-destination-card
                    image="assets/img/destination-6.jpg"
                    [title]="t('galle.title')"
                    [subtitle]="t('galle.subtitle')"
                    [badge]="t('galle.badge')"
                    [alt]="t('galle.alt')"
                    [ctaLabel]="t('viewTours')"
                    [featuredLabel]="t('featured')"
                    [wishlistLabel]="t('wishlist')"
                    [routerLink]="toursLink"
                    [highlights]="[
                      { icon: 'fa-university', label: t('galle.h1') },
                      { icon: 'fa-walking', label: t('galle.h2') },
                      { icon: 'fa-sun', label: t('galle.h3') }
                    ]"
                    (activate)="goTours()">
                </app-destination-card>
            </div>
        </div>
    </div>
</ng-container>
