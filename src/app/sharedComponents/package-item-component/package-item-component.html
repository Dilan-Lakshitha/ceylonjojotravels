<div class="package-item bg-white mb-2" [routerLink]="routerLink">
  <img class="img-fluid package-img" [src]="image" alt="" />

  <div class="p-4">
    <div class="d-flex justify-content-between mb-3">
      <small class="m-0">
        <i class="fa fa-calendar-alt text-primary mr-2"></i>{{ days }}
      </small>
      <small class="m-0">
        <i class="fa fa-user text-primary mr-2"></i>{{ persons }}
      </small>
    </div>

    <a class="h5 text-decoration-none" [routerLink]="routerLink">{{ title }}</a>

    <div class="price-section d-flex justify-content-between align-items-center">

      <div class="rating">
        <i class="fa fa-star text-warning"></i>
        <span>{{ rating }}</span>
      </div>

      <div class="price-box">
        <span class="price">$ {{ (price/2) | number:'1.0-0' }}</span>
        <span class="per">/ person</span>
      </div>

    </div>
    <div class="tour-tags">
      <span><i class="fa fa-check-circle"></i> Reserve Now, Pay Later</span>
      <span><i class="fa fa-check-circle"></i> Pay at Destination</span>
      <span><i class="fa fa-check-circle"></i> Free Cancellation</span>
    </div>
  </div>
</div>
