<div class="acc-item">
  <button type="button" class="acc-head" (click)="toggled.emit()" [attr.aria-expanded]="open">
    <i class="fas location-icon" [ngClass]="iconClass" aria-hidden="true"></i>
    <span class="acc-head__label">{{ title }}</span>
    <span class="acc-head__chevron" [class.is-open]="open" aria-hidden="true">▲</span>
  </button>
  <div class="acc-body" [class.is-open]="open">
    <div class="acc-body__inner">
      <ng-content></ng-content>
    </div>
  </div>
</div>
